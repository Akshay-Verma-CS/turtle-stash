services:
  api:
    build: .
    environment:
      API_KEY: ${API_KEY:-dev-local-api-key}
      DATABASE_URL: postgresql+psycopg://agent_service:agent_service@postgres:5432/agent_service
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_service
      POSTGRES_USER: agent_service
      POSTGRES_PASSWORD: agent_service
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_service -d agent_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
